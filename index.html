<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy: all resources must be local (no external network).
      'unsafe-inline' for styles is required by CodeMirror and Tailwind's JIT.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>Notara</title>
    <!-- Prevent flash of unstyled/white background before CSS loads -->
    <style>html,body,#root{height:100%;margin:0;padding:0}body{background:#080b0e}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
