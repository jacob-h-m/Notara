name: Build & Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (leave blank for all)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'windows', 'macos', 'linux']
  push:
    tags:
      - 'v*.*.*'

# Only one release workflow runs at a time per ref.
# cancel-in-progress: false ensures a running release build is never aborted by
# a subsequent tag push — each tag gets its own complete run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Windows: NSIS installer + zip ─────────────────────────────────────────
  build-windows:
    name: Build Windows (NSIS + zip)
    if: ${{ !inputs.platform || inputs.platform == 'all' || inputs.platform == 'windows' }}
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck electron
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer + electron
        run: npm run build

      - name: Build Windows installers (NSIS + zip)
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_KEY_PASSWORD: ''
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  # ── macOS: DMG (Intel + Apple Silicon) ────────────────────────────────────
  build-macos:
    name: Build macOS (DMG x64 + arm64)
    if: ${{ !inputs.platform || inputs.platform == 'all' || inputs.platform == 'macos' }}
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck electron
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer + electron
        run: npm run build

      - name: Build macOS installers (x64 + arm64 in one pass)
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          CSC_KEY_PASSWORD: ''
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  # ── Linux: AppImage + deb ─────────────────────────────────────────────────
  build-linux:
    name: Build Linux (AppImage + deb)
    if: ${{ !inputs.platform || inputs.platform == 'all' || inputs.platform == 'linux' }}
    # Pin to ubuntu-22.04: ubuntu-24.04 (ubuntu-latest) ships fuse3 only, but
    # electron-builder's AppImageTool requires libfuse2 to mount AppImages during
    # packaging. ubuntu-22.04 has libfuse2 pre-installed.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck electron
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer + electron
        run: npm run build

      - name: Build Linux packages (AppImage + deb)
        run: npx electron-builder --linux --x64 --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 14

  # ── GitHub Release ────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    # Only create a release when triggered by a version tag. If workflow_dispatch
    # is used on a branch (e.g. for testing the build jobs), skip this job so we
    # don't accidentally create a garbage "Notara main" release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release-final
          find artifacts/ -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.zip" \) \
            -exec cp -n {} release-final/ \;
          echo "=== Release contents ==="
          ls -lh release-final/
          ARTIFACT_COUNT=$(find release-final/ -type f | wc -l)
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "ERROR: No release artifacts collected. Check build job logs."
            exit 1
          fi
          echo "Collected $ARTIFACT_COUNT artifacts."

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES=$(cat <<'NOTES_EOF'
            ## Notara v1.0.2 — Initial Release

            Notara is a local-first desktop notes app. Your notes are plain Markdown files on your own machine — no accounts, no cloud, no sync service required.

            ### What's included

            **Editor**
            - WYSIWYG Markdown editor with heading, list, table, task list, link, and image support
            - Raw Markdown side-pane you can toggle open at any time
            - Slash command menu for quick block insertion
            - Find and replace — scoped to the current note or across every note at once

            **Organisation**
            - Tags — add tags to notes via the inline tag bar, filter by tag in the sidebar, rename or delete tags globally from Settings
            - Backlinks panel showing every note that links to the one you're reading
            - Knowledge graph view of your note connections
            - Full-text search across all notes

            **Workflow**
            - Tabbed editing — open multiple notes, drag tabs to reorder, drag tabs between windows
            - Autosave with configurable delay, plus manual save
            - Session restore — your open tabs come back exactly as you left them
            - Version history per note with one-click restore
            - Attachments — import, open, verify, and delete files attached to a note
            - Multi-window support — move notes to a dedicated window or merge them all back

            **Customisation**
            - Light and dark themes, plus custom theme file support
            - Remappable shortcuts via Settings - Keybindings; the menu bar updates instantly
            - Adjustable font size, word wrap, tab width, and word count display

            ### Download

            Windows: Notara-Setup-1.0.2.exe (installer) or Notara-1.0.2-x64.zip (portable)
            macOS: Notara-1.0.2-x64.dmg (Intel) or Notara-1.0.2-arm64.dmg (Apple Silicon)
            Linux: Notara-1.0.2-x64.AppImage or Notara-1.0.2-amd64.deb
            NOTES_EOF
          )

          # Delete any existing release attached to this tag (e.g. a stale draft)
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" release-final/* \
            --title "Notara $TAG" \
            --notes "$NOTES" \
            --draft \
            --verify-tag
