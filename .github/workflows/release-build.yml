name: Build release artifacts on tag
permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build renderer and Electron
        run: npm run build

      - name: Build native installers
        run: npx electron-builder --publish never
        env:
          # Placeholder – set these secrets in repo Settings to enable code signing.
          # Windows: CSC_LINK (base64 PFX), CSC_KEY_PASSWORD
          # macOS:   CSC_LINK (base64 .p12), CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release/**/*
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Create GitHub Release
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect installer files into one directory
        run: |
          mkdir -p release
          echo 'Artifacts tree:'
          find artifacts -type f -maxdepth 6 -print || true
          echo 'Copying installer files into release/ (verbose)'
          find artifacts -type f \(
            -iname '*.exe' -o -iname '*.msi' -o -iname '*.appx' -o 
            -iname '*.msix' -o -iname '*.dmg' -o -iname '*.appimage' -o 
            -iname '*.deb' -o -iname '*.rpm' -o -iname '*.zip' 
          \) -exec cp -v {} release/ \; || true
          echo 'Collected files:'
          ls -la release/ || (echo 'No installer files were collected' && exit 1)

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          bodyFile: CHANGELOG.md
          allowUpdates: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
