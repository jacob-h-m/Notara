name: PR Smoke Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

# Cancel in-progress smoke runs for the same PR when a new commit arrives.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke (critical flows)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run critical smoke tests
        env:
          CI: true
        run: npx playwright test tests/visual/critical.spec.js --config=playwright.config.js --retries=1 --max-failures=3 --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report
          retention-days: 7
