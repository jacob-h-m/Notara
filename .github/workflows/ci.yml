name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  ci:
    name: Typecheck, lint, build, E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vite production build
        run: npm run build

      - name: Electron build (create installers)
        run: |
          # Build Electron installers. `npm run electron:build` runs vite build then electron-builder.
          if npm run electron:build --if-present; then
            echo "electron:build succeeded"
          else
            echo "npm electron:build failed — falling back to npx electron-builder"
            npx electron-builder --publish never
          fi

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: release/
