name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  ci:
    name: Typecheck, lint, build, E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vite production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Vite dev server (background)
        run: npm run dev &
        env:
          VITE_DEV_SERVER_URL: ''

      - name: Wait for dev server
        run: npx wait-on http://127.0.0.1:5173 --timeout 60000

      - name: Run Playwright smoke test
        run: npx playwright test tests/smoke/ipc-note-lifecycle.spec.js --config=playwright.config.js
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
