name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  ci:
    name: Typecheck, lint, build, E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vite production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run preview server and Playwright smoke test
        run: |
          nohup npm run preview -- --port 5173 --host 127.0.0.1 > preview.log 2>&1 &
          npx wait-on http://127.0.0.1:5173 --timeout 60000
          npx playwright test tests/smoke/ipc-note-lifecycle.spec.js --config=playwright.config.js || (echo "Playwright failed"; exit 1)
        env:
          CI: 'true'

      - name: Upload preview log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-log
          path: preview.log

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
