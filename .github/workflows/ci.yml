name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:

# Cancel in-progress runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck (renderer)
        run: npm run typecheck

      - name: Typecheck (electron)
        run: npm run typecheck:electron

      - name: Unit tests
        run: npm run test:unit

      - name: Production build
        run: npm run build
